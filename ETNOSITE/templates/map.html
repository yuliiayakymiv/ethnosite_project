<style>
.map-container {
    padding: 20px 40px;
}
.map-header {
    margin-bottom: 20px;
}
.map-wrapper {
    position: relative;
    max-width: 1100px;
    margin: 0 auto;
}
#ukraine-map {
    width: 100%;
    height: auto;
    filter: drop-shadow(0 4px 16px rgba(100, 24, 24, 0.25));
}
.region {
    fill: #f8caca;
    stroke: #fff;
    stroke-width: 1.5;
    cursor: pointer;
    transition: fill 0.2s ease;
}
.region:hover {
    fill: #7b1a1a;
}
.region-tooltip {
    position: absolute;
    background: #3d0c0c;
    color: #fff;
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: bold;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    white-space: nowrap;
    z-index: 10;
}
</style>

<script>
    const regions = document.querySelectorAll('.region');
    const tooltip = document.getElementById('tooltip');
    const mapWrapper = document.querySelector('.map-wrapper');

    regions.forEach(region => {
        region.addEventListener('mousemove', (e) => {
            const rect = mapWrapper.getBoundingClientRect();
            tooltip.textContent = region.dataset.name;
            tooltip.style.opacity = '1';
            tooltip.style.left = (e.clientX - rect.left + 12) + 'px';
            tooltip.style.top = (e.clientY - rect.top - 30) + 'px';
        });

        region.addEventListener('mouseleave', () => {
            tooltip.style.opacity = '0';
        });

        region.addEventListener('click', () => {
            window.location.href = `/news?region=${encodeURIComponent(region.dataset.region)}`;
        });
    });
</script>
